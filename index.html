<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- TOPBAR -->
  <header id="topbar">
    <div id="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
      <span class="logo-text">SVG Editor</span>
    </div>
    <div id="topbar-hint">Click paths to select · Shift+click for multi-select · Group &amp; annotate</div>
    <div id="topbar-actions">
      <button class="icon-btn" id="btn-undo" title="Undo (Ctrl+Z)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M3 13C5.33 7.67 10.5 4 17 4c3.5 0 6.5 1.5 8.5 4"/></svg>
      </button>
      <button class="icon-btn" id="btn-redo" title="Redo (Ctrl+Y)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M21 13C18.67 7.67 13.5 4 7 4 3.5 4 .5 5.5-1.5 8"/></svg>
      </button>
      <button class="icon-btn" id="btn-delete" title="Delete selected (Del)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
      <div class="topbar-divider"></div>
      <button class="btn btn-ghost" id="btn-copy-svg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy SVG
      </button>
      <button class="btn btn-primary" id="btn-export-svg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export
      </button>
    </div><!-- /topbar-actions -->
  </header>

  <!-- BODY -->
  <div id="body">

    <!-- LEFT PANEL -->
    <aside id="left-panel">

      <!-- SVG INPUT -->
      <section class="panel-section" id="section-input">
        <div class="section-header">
          <span class="section-label">SVG INPUT</span>
          <label class="link-btn" for="file-upload">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Upload File
          </label>
          <input type="file" id="file-upload" accept=".svg" hidden />
        </div>
        <textarea id="svg-input" placeholder="Paste SVG code here..."></textarea>
        <button class="btn btn-primary btn-full" id="btn-render">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Render SVG
        </button>
      </section>

      <!-- SELECTED ELEMENTS -->
      <section class="panel-section" id="section-selection">
        <div class="section-header">
          <span class="section-label">SELECTED ELEMENTS</span>
          <button class="link-btn" id="btn-clear-sel">Clear</button>
        </div>
        <div id="chip-row">
          <span class="empty-hint">None selected</span>
        </div>
        <button class="btn btn-primary btn-full" id="btn-group">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
          Group into &lt;g&gt;
        </button>
      </section>

      <!-- SET ATTRIBUTES -->
      <section class="panel-section" id="section-attrs">
        <div class="section-header">
          <span class="section-label">SET ATTRIBUTES</span>
        </div>
        <div id="attr-target">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 3 7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="m13 13 6 6"/></svg>
          <span id="attr-target-label">Select an element first</span>
        </div>
        <div class="field-group">
          <label class="field-label" for="attr-id">ID</label>
          <input class="field-input" type="text" id="attr-id" placeholder="e.g. icon-body" />
        </div>
        <div class="field-group">
          <label class="field-label" for="attr-class">Class(es)</label>
          <input class="field-input" type="text" id="attr-class" placeholder="e.g. fill-red stroke-black" />
        </div>
        <div class="btn-row">
          <button class="btn btn-primary btn-half" id="btn-apply-sel">Apply to Selected</button>
          <button class="btn btn-outline btn-half" id="btn-apply-grp">Apply to Group</button>
        </div>
      </section>

      <!-- SVG OUTPUT / CODE EDITOR -->
      <section class="panel-section panel-section--grow" id="section-output">
        <div class="section-header">
          <span class="section-label">SVG CODE</span>
          <div style="display:flex;gap:4px;align-items:center;">
            <button class="btn btn-ghost btn-sm" id="btn-apply-code" title="Apply changes (Ctrl+Enter)">Apply</button>
            <button class="icon-btn" id="btn-copy-output" title="Copy output">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
        </div>
        <textarea id="svg-output-code" spellcheck="false" placeholder="SVG code appears here — edit and press Ctrl+Enter to apply"></textarea>
      </section>

    </aside>

    <!-- ELEMENT TREE PANEL -->
    <aside id="right-panel">
      <div class="section-header" style="padding: 10px 14px; border-bottom: 1px solid var(--border); flex-shrink:0;">
        <span class="section-label">ELEMENT TREE</span>
        <button class="icon-btn" id="btn-collapse-tree" title="Collapse all">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
      </div>
      <div id="tree-root">
        <div class="tree-empty">Render an SVG to see its tree</div>
      </div>
    </aside>

    <!-- MAIN PREVIEW -->
    <main id="main-area">
      <div id="preview-toolbar">
        <span class="section-label">PREVIEW</span>
        <div id="toolbar-right">
          <button class="btn btn-ghost btn-sm" id="btn-fit">Fit</button>
          <button class="icon-btn" id="btn-zoom-out" title="Zoom out">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </button>
          <span id="zoom-level">100%</span>
          <button class="icon-btn" id="btn-zoom-in" title="Zoom in">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </button>
        </div>
      </div>

      <div id="canvas-wrap">
        <canvas id="ruler-h"></canvas>
        <canvas id="ruler-v"></canvas>
        <div id="ruler-corner"></div>
        <div id="marquee-rect"></div>
        <div id="canvas-empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          <p>Paste SVG and click <strong>Render SVG</strong></p>
        </div>
        <div id="canvas-bg">
          <div id="svg-viewport">
            <!-- SVG renders here -->
          </div>
        </div>
      </div>
    </main>

  </div>

  <script src="app.js"></script>
  <script src="tree.js"></script>
  <script src="history.js"></script>
  <script src="pan.js"></script>
</body>
</html>
